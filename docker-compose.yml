version: "3.8"

services:
  openwa:
    build:
      context: .
      dockerfile: Dockerfile.openwa
    container_name: openwa-test
    environment:
      WA_EXECUTABLE_PATH: /usr/bin/chromium
      WA_USE_CHROME: "true"
      WA_CHROME_ARGS: "--no-sandbox --disable-dev-shm-usage --disable-gpu --headless"
    volumes:
      - ./openwa.config.json:/usr/src/app/openwa.config.json:ro
      - ./sessions:/usr/src/app/sessions
      - ./media:/usr/src/app/media
    ports:
      - "8001:8001"   # API REST (se ativada)
      - "8002:8002"   # Dashboard Web (se ativada)
    tmpfs:
      - /dev/shm:size=1g
    restart: unless-stopped
